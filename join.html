<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join - D.K.S Transport</title>

<style>
body {
margin: 0;
font-family: Arial;
color: white;
background: black;
overflow-x: hidden;
}

/* ACHTERGROND */
.background {
position: fixed;
width: 100%;
height: 100%;
background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
url("truck14.png") center/cover no-repeat;
z-index: -2;
transform: scale(1.1);
}

/* NAVBAR */
nav {
position: fixed;
top: 0;
width: 100%;
background: rgba(0,0,0,0.6);
backdrop-filter: blur(15px);
padding: 15px;
text-align: center;
border-bottom: 2px solid orange;
z-index: 1000;
}

nav a {
color: orange;
margin: 0 12px;
text-decoration: none;
font-weight: bold;
transition: 0.3s;
}

nav a:hover {
color: white;
text-shadow: 0 0 15px orange;
}

/* HERO */
.hero {
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 120px 20px 40px;
animation: fadeIn 1.5s ease;
}

/* FADE IN */
@keyframes fadeIn {
from {
opacity: 0;
transform: translateY(30px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

/* TITEL */
.hero h1 {
font-size: 50px;
letter-spacing: 2px;
animation: glow 2s infinite alternate;
filter: drop-shadow(0 0 20px orange);
}

/* GLOW */
@keyframes glow {
from { text-shadow: 0 0 10px orange; }
to { text-shadow: 0 0 50px orange, 0 0 80px red; }
}

/* LIJN */
.glow-line {
width: 140px;
height: 3px;
background: orange;
margin: 15px auto;
box-shadow: 0 0 20px orange;
}

/* TEKST */
.hero p {
max-width: 600px;
font-size: 18px;
opacity: 0.9;
}

/* BUTTONS */
.buttons {
margin-top: 35px;
display: flex;
gap: 20px;
flex-wrap: wrap;
justify-content: center;
}

.btn {
padding: 18px 35px;
border-radius: 50px;
font-weight: bold;
font-size: 16px;
transition: 0.3s;
text-decoration: none;
display: inline-block;
}

/* CLICK EFFECT */
.btn:active {
transform: scale(0.95);
}

/* DISCORD */
.discord-btn {
background: linear-gradient(135deg, #5865F2, #4752c4);
color: white;
box-shadow: 0 0 25px #5865F2;
}

.discord-btn:hover {
transform: scale(1.1);
box-shadow: 0 0 60px #5865F2;
}

/* TMP */
.tmp-btn {
background: linear-gradient(135deg, orange, #ff7b00);
color: black;
box-shadow: 0 0 25px orange;
}

.tmp-btn:hover {
transform: scale(1.1);
background: white;
}
</style>
</head>

<body>

<div class="background"></div>

<nav>
<a href="index.html">Home</a>
<a href="over.html">Over</a>
<a href="team.html">Team</a>
<a href="wagenpark.html">Wagenpark</a>
<a href="gallery.html">Gallery</a>
<a href="join.html">Join</a>
</nav>


<div class="hero">

<h1>Join D.K.S Transport 🚛</h1>
<div class="glow-line"></div>

<p>
Wil jij onderdeel worden van onze VTC?  
Join onze Discord en rij gezellig met ons mee!
</p>

<div class="buttons">

<a href="https://discord.gg/dkstransport" target="_blank" class="btn discord-btn">
🚀 Join Discord
</a>

<a href="https://truckersmp.com/vtc/88430" target="_blank" class="btn tmp-btn">
📦 Bekijk onze VTC
</a>

</div>

</div>

<!-- PARALLAX SCRIPT -->
<script>
window.addEventListener("scroll", function() {
document.querySelector(".background").style.transform =
"scale(1.1) translateY(" + window.scrollY * 0.2 + "px)";
});
</script>

</body>
</html>
