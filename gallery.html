<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerij - D.K.S Transport</title>

<style>
body {
margin: 0;
background: black;
color: white;
font-family: Arial;
overflow-x: hidden;
}

/* NAVBAR */
nav {
position: fixed;
top: 0;
width: 100%;
background: rgba(0,0,0,0.7);
backdrop-filter: blur(15px);
padding: 15px;
text-align: center;
border-bottom: 2px solid orange;
z-index: 1000;
}

nav a {
color: orange;
margin: 0 12px;
text-decoration: none;
font-weight: bold;
transition: 0.3s;
}

nav a:hover {
color: white;
text-shadow: 0 0 10px orange;
}

/* TITLE */
.title {
padding-top: 100px;
text-align: center;
}

.title h1 {
font-size: 42px;
text-shadow: 0 0 20px orange;
}

/* GRID */
.gallery {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
gap: 15px;
padding: 20px;
}

/* IMAGE */
.item {
overflow: hidden;
border-radius: 15px;
cursor: pointer;
transition: 0.4s;
}

.item img {
width: 100%;
height: 100%;
object-fit: cover;
transition: 0.4s;
}

/* HOVER */
.item:hover,
.item:active {
transform: scale(1.05);
box-shadow: 0 0 30px orange;
}

.item:hover img {
transform: scale(1.1);
filter: brightness(0.8);
}

/* LIGHTBOX */
.lightbox {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.95);
display: none;
justify-content: center;
align-items: center;
z-index: 2000;
}

.lightbox img {
max-width: 90%;
max-height: 90%;
border-radius: 10px;
box-shadow: 0 0 40px orange;
}

/* DISCORD */
.discord {
position: fixed;
bottom: 20px;
right: 20px;
background: #5865F2;
padding: 15px 25px;
border-radius: 50px;
color: white;
text-decoration: none;
font-weight: bold;
box-shadow: 0 0 20px #5865F2;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="over.html">Over</a>
<a href="team.html">Team</a>
<a href="wagenpark.html">Wagenpark</a>
<a href="gallery.html">Gallery</a>
<a href="join.html">Join</a>
</nav>

<div class="title">
<h1>📸 Onze Galerij</h1>
</div>

<div class="gallery">

<div class="item"><img src="truck16.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck17.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck18.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck19.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck20.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck21.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck22.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck23.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck24.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck25.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck26.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck27.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck28.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck29.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck30.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck31.png" onclick="openImg(this.src)"></div>
<div class="item"><img src="truck32.png" onclick="openImg(this.src)"></div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>
function openImg(src) {
document.getElementById("lightbox").style.display = "flex";
document.getElementById("lightbox-img").src = src;
}

document.getElementById("lightbox").onclick = function() {
this.style.display = "none";
}
</script>

<a href="https://discord.gg/dkstransport" class="discord">Discord</a>

</body>
</html>
